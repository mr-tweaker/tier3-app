AWSTemplateFormatVersion: '2010-09-09'
Description: Assignment 2 - EC2 using latest Amazon Linux 2 AMI from SSM Parameter Store

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
    Description: EC2 instance type

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair

Resources:
  MyInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      # Account and region agnostic lookup of the latest Amazon Linux 2 AMI
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-al2-instance'

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref MyInstance

